<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skillless · 上手</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <span class="logo">
        <span class="logo-mark">
          <img src="../assets/icon-128.png" alt=""
               onerror="this.parentNode.classList.add('no-img'); this.remove();" />
        </span>
        <span class="logo-name">Skillless</span>
      </span>
      <button type="button" class="btn-ghost" id="btn-cancel" title="稍后再设置">稍后再说</button>
    </header>

    <main class="stage" id="stage"></main>

    <footer class="foot">
      <div class="dots" id="dots"></div>
      <div class="actions" id="actions"></div>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
