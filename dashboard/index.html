<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skillless · 后台</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">Skillless</div>
      <nav class="nav">
        <div class="nav-group">
          <button type="button" class="nav-item active" data-tab="home"><span class="nav-ico">●</span><span class="nav-label">首页</span></button>
          <button type="button" class="nav-item" data-tab="history"><span class="nav-ico">⊟</span><span class="nav-label">历史</span></button>
          <button type="button" class="nav-item" data-tab="dict"><span class="nav-ico">⊘</span><span class="nav-label">黑名单</span></button>
          <button type="button" class="nav-item" data-tab="hotkey"><span class="nav-ico">⌘</span><span class="nav-label">快捷键</span></button>
        </div>
      </nav>
      <div class="sidebar-foot">
        <div class="foot-actions">
          <button type="button" class="foot-icon" data-foot="kb" title="在 Finder 中打开知识库">⌗</button>
          <button type="button" class="foot-icon" data-foot="report" title="UI 设计报告">◉</button>
          <button type="button" class="foot-icon" data-foot="events" title="查看埋点 jsonl">≡</button>
        </div>
        <div class="foot-ver">v1.0</div>
      </div>
    </aside>

    <main class="content" id="content">
      <div class="loading">加载中…</div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
