<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skillless · 后台</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">
          <img src="../assets/icon-128.png" alt=""
               onerror="this.parentNode.classList.add('no-img'); this.remove();" />
        </span>
        <span class="brand-name">Skillless</span>
      </div>
      <nav class="nav">
        <div class="nav-group">
          <button type="button" class="nav-item active" data-tab="home"><span class="nav-ico">●</span><span class="nav-label">首页</span></button>
          <button type="button" class="nav-item" data-tab="history"><span class="nav-ico">⊟</span><span class="nav-label">历史</span></button>
          <button type="button" class="nav-item" data-tab="dict"><span class="nav-ico">⊘</span><span class="nav-label">黑名单</span></button>
          <button type="button" class="nav-item" data-tab="hotkey"><span class="nav-ico">⌘</span><span class="nav-label">快捷键</span></button>
        </div>
      </nav>
      <div class="sidebar-foot">
        <div class="foot-ver">Skillless · v1.0</div>
      </div>
    </aside>

    <main class="content" id="content">
      <div class="loading">加载中…</div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
