knowledge_base:
  root: /Users/linxiaolan10/knowledge
provider: deepseek
models:
  anthropic:
    model: claude-sonnet-4-5
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://api.anthropic.com/v1/messages
  openai:
    model: gpt-4o-mini
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1/chat/completions
  deepseek:
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com/v1/chat/completions
actions:
  daily:
    label: 追加到今日杂记
    target: 今日杂记.md
    prompt: prompts/daily.md
    section: '## {date}'
  shunshoumai:
    label: 追加到顺手买知识库
    target: 顺手买信息.md
    prompt: prompts/shunshoumai.md
    section: auto
  todo:
    label: 提取待办
    target: 今日杂记.md
    prompt: prompts/todo.md
    section: '## {date} · 待办'
  meeting:
    label: 提取会议结论
    target: 会议纪要.md
    prompt: prompts/meeting.md
    section: '## {date}'
  divergence:
    label: 提取产品分歧
    target: 产品分歧.md
    prompt: prompts/divergence.md
    section: '## {date}'
  weekly:
    label: 生成周报素材
    target: 周报素材.md
    prompt: prompts/weekly.md
    section: '## 第 {iso_week} 周'
  longxia:
    label: 追加到龙虾日记素材
    target: 龙虾日记素材.md
    prompt: prompts/daily.md
    section: '## {date}'
behavior:
  auto_git_checkpoint: true
  notify: true
  write_archive_log: true
  auto_prompt_min_length: 100
  auto_prompt_max_length: 20000
  auto_mute_after_skips: 2
  ai_preview_before_write: true
  skip_code_like: true
  clipboard_stable_ms: 700
  skip_blacklist:
  - ^\d{1,4}$
  - ^[A-Za-z0-9_-]{6,}$
custom_prompts: []
